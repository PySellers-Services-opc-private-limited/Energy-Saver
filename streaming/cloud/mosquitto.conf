# ── MQTT listener ─────────────────────────────────────────
listener 1883
allow_anonymous true

# ── WebSocket listener (for browser dashboards) ──────────
listener 9001
protocol websockets
allow_anonymous true

# ── Persistence ───────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ───────────────────────────────────────────────
log_type error
log_type warning
log_type notice
